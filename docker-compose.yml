version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: contentforge_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contentforge
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contentforge_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/contentforge
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      AI_API_KEY: ${AI_API_KEY:-${TOGETHER_API_KEY}}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.together.xyz/v1}
      AI_MODEL: ${AI_MODEL:-meta-llama/Llama-3.3-70B-Instruct-Turbo}
      IMAGE_MODEL: ${IMAGE_MODEL:-black-forest-labs/FLUX.1-schnell}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY}
      CORS_ORIGINS: http://localhost:3001,http://localhost:3000,http://localhost:5173,http://localhost:8002
    ports:
      - "8002:8000"
    volumes:
      - ./backend:/app
      - ./product_marketing_agent.py:/app/product_marketing_agent.py
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        echo 'Running migrations...' &&
        alembic upgrade head &&
        echo 'Starting server...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: contentforge_frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8002
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true

